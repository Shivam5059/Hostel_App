{% extends "base.html" %}
{% block title %}Apply Leave – Hostel Manager{% endblock %}
{% block content %}
<h2 class="mb-4">Apply for Leave</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            {% if current_user.role in ('admin', 'warden') and students %}
            <div class="mb-3">
                <label class="form-label">Student <span class="text-danger">*</span></label>
                <select name="student_id" class="form-select" required>
                    <option value="">— Select Student —</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.full_name }} ({{ s.student_id }})</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">From Date <span class="text-danger">*</span></label>
                    <input type="date" name="from_date" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">To Date <span class="text-danger">*</span></label>
                    <input type="date" name="to_date" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Reason <span class="text-danger">*</span></label>
                    <textarea name="reason" class="form-control" rows="3" required></textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-info text-white">Apply</button>
                <a href="{{ url_for('leaves.list_leaves') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
