{% extends "base.html" %}
{% block title %}{{ action }} Student – Hostel Manager{% endblock %}
{% block content %}
<h2 class="mb-4">{{ action }} Student</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Student ID <span class="text-danger">*</span></label>
                    <input type="text" name="student_id" class="form-control"
                           value="{{ student.student_id if student else '' }}"
                           {% if student %}readonly{% endif %} required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" name="full_name" class="form-control"
                           value="{{ student.full_name if student else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control"
                           value="{{ student.email if student else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ student.phone if student else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Course</label>
                    <input type="text" name="course" class="form-control"
                           value="{{ student.course if student else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Year</label>
                    <input type="number" name="year" class="form-control" min="1" max="6"
                           value="{{ student.year if student else '1' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Assign Room</label>
                    <select name="room_id" class="form-select">
                        <option value="">— No Room —</option>
                        {% for room in rooms %}
                        <option value="{{ room.id }}"
                            {% if student and student.room_id == room.id %}selected{% endif %}>
                            {{ room.room_number }} ({{ room.room_type }}, {{ room.available_beds }} bed(s) free)
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ student.address if student else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">{{ action }} Student</button>
                <a href="{{ url_for('students.list_students') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
