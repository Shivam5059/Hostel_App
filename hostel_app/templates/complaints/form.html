{% extends "base.html" %}
{% block title %}New Complaint – Hostel Manager{% endblock %}
{% block content %}
<h2 class="mb-4">Submit Complaint</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            {% if current_user.role in ('admin', 'warden') and students %}
            <div class="mb-3">
                <label class="form-label">Student <span class="text-danger">*</span></label>
                <select name="student_id" class="form-select" required>
                    <option value="">— Select Student —</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.full_name }} ({{ s.student_id }})</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="mb-3">
                <label class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    <option value="maintenance">Maintenance</option>
                    <option value="cleanliness">Cleanliness</option>
                    <option value="food">Food</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Description <span class="text-danger">*</span></label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a href="{{ url_for('complaints.list_complaints') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
